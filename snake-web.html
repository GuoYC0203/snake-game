<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇 - Snake Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.game-wrapper{text-align:center}
.game-wrapper h1{color:#6366f1;font-size:28px;margin-bottom:12px;letter-spacing:4px;font-weight:700}
.score-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#1a1a2e;border-radius:12px 12px 0 0;border-bottom:2px solid #252540}
.score-bar .score{color:#fff;font-size:18px;font-weight:600}
.score-bar .score span{color:#6366f1;font-size:22px}
.score-bar .hint{color:#666;font-size:13px}
canvas{display:block;background:#1a1a2e;border-radius:0 0 12px 12px;box-shadow:0 10px 40px rgba(99,102,241,0.15)}
.controls{margin-top:16px;color:#555;font-size:14px;line-height:1.8}
.controls kbd{background:#252540;color:#6366f1;padding:3px 10px;border-radius:6px;font-size:13px;border:1px solid #333355}
.mobile-controls{display:none;margin-top:16px;gap:8px;justify-content:center}
.mobile-controls .dir-btn{width:56px;height:56px;border-radius:14px;border:1px solid #333355;background:#1a1a2e;color:#6366f1;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.mobile-controls .dir-btn:active{background:#252540;transform:scale(0.92)}
.mobile-controls .mid-row{display:flex;gap:8px;justify-content:center}
@media(max-width:600px){
  canvas{width:100vw;height:auto;max-width:360px}
  .mobile-controls{display:flex;flex-wrap:wrap}
}
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>🐍 贪吃蛇</h1>
  <div class="score-bar">
    <div class="score">分数 <span id="scoreDisplay">0</span></div>
    <div class="hint">← ↑ → ↓</div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div class="controls">
    方向键 / <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制移动 ·
    按 <kbd>空格</kbd> 重新开始
  </div>
  <div class="mobile-controls" id="mobileControls">
    <div></div>
    <button class="dir-btn" data-dir="up">▲</button>
    <div></div>
    <div class="mid-row">
      <button class="dir-btn" data-dir="left">◀</button>
      <button class="dir-btn" id="restartBtn" style="font-size:16px;color:#ff4757">↻</button>
      <button class="dir-btn" data-dir="right">▶</button>
    </div>
    <div></div>
    <button class="dir-btn" data-dir="down">▼</button>
    <div></div>
  </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreSpan = document.getElementById('scoreDisplay');

const COLS = 20;
const ROWS = 20;
const CELL = 20;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

let snake, food, direction, nextDir, score, gameOver, running, animFrame;

function init() {
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  direction = 'right';
  nextDir = 'right';
  score = 0;
  gameOver = false;
  running = true;
  scoreSpan.textContent = '0';
  spawnFood();
  if (animFrame) cancelAnimationFrame(animFrame);
  let lastTime = 0;
  const step = 150;

  function loop(time) {
    if (!running && !gameOver) { animFrame = requestAnimationFrame(loop); return; }
    if (time - lastTime >= step) {
      lastTime = time;
      if (!gameOver) move();
      draw();
    }
    animFrame = requestAnimationFrame(loop);
  }
  animFrame = requestAnimationFrame(loop);
}

function spawnFood() {
  let p;
  do { p = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)}; }
  while (snake.some(s => s.x === p.x && s.y === p.y));
  food = p;
}

function move() {
  direction = nextDir;
  const head = {...snake[0]};
  switch (direction) {
    case 'up': head.y--; break;
    case 'down': head.y++; break;
    case 'left': head.x--; break;
    case 'right': head.x++; break;
  }
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver = true;
    running = false;
    draw();
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreSpan.textContent = score;
    spawnFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#252540';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
  }

  // Food
  if (food) {
    ctx.shadowColor = '#ff4757';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ff4757';
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff6b7a';
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL / 2 - 2, food.y * CELL + CELL / 2 - 3, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Snake
  for (let i = 0; i < snake.length; i++) {
    const s = snake[i];
    const pad = i === 0 ? 1 : 2;
    const radius = i === 0 ? 6 : 4;
    const ratio = 0.4 + (1 - i / snake.length) * 0.6;
    const r = Math.floor(99 * ratio);
    const g = Math.floor(102 * ratio);
    const b = Math.floor(241 * ratio);
    ctx.shadowBlur = i === 0 ? 6 : 0;
    ctx.shadowColor = '#6366f1';
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    roundRect(ctx, s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, radius);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Eyes
    if (i === 0) {
      ctx.fillStyle = '#fff';
      const cx = s.x * CELL, cy = s.y * CELL;
      if (direction === 'up') {
        ctx.fillRect(cx + 6, cy + 4, 3, 3); ctx.fillRect(cx + 12, cy + 4, 3, 3);
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(cx + 7, cy + 5, 1, 1); ctx.fillRect(cx + 13, cy + 5, 1, 1);
      } else if (direction === 'down') {
        ctx.fillRect(cx + 6, cy + 14, 3, 3); ctx.fillRect(cx + 12, cy + 14, 3, 3);
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(cx + 7, cy + 15, 1, 1); ctx.fillRect(cx + 13, cy + 15, 1, 1);
      } else if (direction === 'left') {
        ctx.fillRect(cx + 4, cy + 6, 3, 3); ctx.fillRect(cx + 4, cy + 12, 3, 3);
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(cx + 5, cy + 7, 1, 1); ctx.fillRect(cx + 5, cy + 13, 1, 1);
      } else {
        ctx.fillRect(cx + 14, cy + 6, 3, 3); ctx.fillRect(cx + 14, cy + 12, 3, 3);
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(cx + 15, cy + 7, 1, 1); ctx.fillRect(cx + 15, cy + 13, 1, 1);
      }
    }
  }

  // Game Over
  if (gameOver) {
    ctx.fillStyle = 'rgba(15,15,26,0.85)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);
    ctx.font = '16px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText('得分: ' + score, canvas.width / 2, canvas.height / 2 + 20);
    ctx.fillStyle = '#6366f1';
    ctx.font = '14px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText('按 空格键 重新开始', canvas.width / 2, canvas.height / 2 + 60);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ' && gameOver) { init(); return; }
  if (!running || gameOver) return;
  const key = e.key.toLowerCase();
  if ((key === 'arrowup' || key === 'w') && direction !== 'down') nextDir = 'up';
  if ((key === 'arrowdown' || key === 's') && direction !== 'up') nextDir = 'down';
  if ((key === 'arrowleft' || key === 'a') && direction !== 'right') nextDir = 'left';
  if ((key === 'arrowright' || key === 'd') && direction !== 'left') nextDir = 'right';
  e.preventDefault();
});

// Mobile controls
document.querySelectorAll('.dir-btn[data-dir]').forEach(btn => {
  btn.addEventListener('click', () => {
    const dir = btn.dataset.dir;
    if (gameOver) { init(); return; }
    if (!running) return;
    if (dir === 'up' && direction !== 'down') nextDir = 'up';
    if (dir === 'down' && direction !== 'up') nextDir = 'down';
    if (dir === 'left' && direction !== 'right') nextDir = 'left';
    if (dir === 'right' && direction !== 'left') nextDir = 'right';
  });
});
document.getElementById('restartBtn').addEventListener('click', () => { init(); });

// Touch swipe
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, {passive: true});
canvas.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
canvas.addEventListener('touchend', e => {
  if (gameOver) { init(); return; }
  if (!running) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && direction !== 'left') nextDir = 'right';
    else if (dx < 0 && direction !== 'right') nextDir = 'left';
  } else {
    if (dy > 0 && direction !== 'up') nextDir = 'down';
    else if (dy < 0 && direction !== 'down') nextDir = 'up';
  }
}, {passive: true});

init();
</script>
</body>
</html>
